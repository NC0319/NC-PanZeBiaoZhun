<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5b4fcf">
<title>NC判责标准</title>
<style>
:root{--primary:#5b4fcf;--primary-light:#818cf8;--bg:#f5f5f5;--card:#ffffff;--text-p:#1a1a1a;--text-s:#757575;--text-h:#bdbdbd;--divider:#e0e0e0;--success:#43a047;--success-bg:#e8f5e9;--warning:#f9a825;--warning-bg:#fff8e1;--error:#e53935;--error-bg:#ffebee;--info-bg:#e3f2fd;--safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,0px);--nav-h:64px;--shadow:0 2px 8px rgba(0,0,0,.04);--r-lg:16px;--r-md:12px;--r-sm:8px}
@media(prefers-color-scheme:dark){:root{--bg:#121212;--card:#1e1e1e;--text-p:#e0e0e0;--text-s:#9e9e9e;--text-h:#616161;--divider:#333;--success-bg:#1b3a1e;--warning-bg:#3a2f0e;--error-bg:#3a1212;--info-bg:#1a2340;--shadow:0 2px 8px rgba(0,0,0,.2)}}
.dark-mode{--bg:#121212;--card:#1e1e1e;--text-p:#e0e0e0;--text-s:#9e9e9e;--text-h:#616161;--divider:#333;--success-bg:#1b3a1e;--warning-bg:#3a2f0e;--error-bg:#3a1212;--info-bg:#1a2340;--shadow:0 2px 8px rgba(0,0,0,.2)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text-p);height:100%;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.status-bar{height:44px;padding-top:var(--safe-top);background:var(--card);display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;font-size:12px;color:var(--text-s);border-bottom:.5px solid var(--divider);flex-shrink:0;z-index:100}
.status-left{display:flex;align-items:center;gap:4px}
.status-right{display:flex;align-items:center;gap:6px}
.battery{width:22px;height:11px;border:1.5px solid var(--text-s);border-radius:2px;position:relative}
.battery::after{content:'';position:absolute;right:-4px;top:2.5px;width:2px;height:4px;background:var(--text-s);border-radius:0 1px 1px 0}
.battery-level{height:100%;width:70%;background:var(--success);border-radius:1px}
.nav-bar{height:52px;background:var(--card);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:.5px solid var(--divider);flex-shrink:0;z-index:100}
.nav-back{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--r-sm)}
.nav-back:active{background:var(--bg)}
.nav-title{font-size:17px;font-weight:600;position:absolute;left:50%;transform:translateX(-50%)}
.nav-right{display:flex;align-items:center;gap:2px}
.nav-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;font-size:18px;cursor:pointer;border-radius:var(--r-sm);color:var(--text-p)}
.nav-btn:active{background:var(--bg)}
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}
.page{display:none;padding:16px;min-height:100%}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:20px;padding:28px 20px;margin-bottom:20px;color:white;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-card::after{content:'';position:absolute;right:30px;bottom:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero-emoji{font-size:44px;margin-bottom:12px;display:block}
.hero-title{font-size:24px;font-weight:700;margin-bottom:6px}
.hero-sub{font-size:14px;opacity:.9}
.hero-version{display:inline-block;margin-top:12px;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.2);font-size:12px}
.hero-stats{display:flex;gap:20px;margin-top:16px}
.hero-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.hero-stat-num{font-size:22px;font-weight:800}
.hero-stat-label{font-size:11px;opacity:.8}
.section-title{font-size:13px;font-weight:600;color:var(--text-s);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 12px;padding-left:4px;display:flex;align-items:center;justify-content:space-between}
.section-title .see-all{font-size:12px;color:var(--primary);cursor:pointer;text-transform:none;letter-spacing:normal}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid-card{background:var(--card);border-radius:var(--r-lg);padding:20px 16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.grid-card:active{transform:scale(.97);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-desc{font-size:12px;color:var(--text-s);line-height:1.3}
.card-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600}
.badge-new{background:#fff3e0;color:#e65100}
.c-blue .card-icon{background:linear-gradient(135deg,#e8eaf6,#c5cae9)}
.c-orange .card-icon{background:linear-gradient(135deg,#fff3e0,#ffe0b2)}
.c-green .card-icon{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.c-pink .card-icon{background:linear-gradient(135deg,#fce4ec,#f8bbd0)}
.c-red .card-icon{background:linear-gradient(135deg,#ffebee,#ffcdd2)}
.c-indigo .card-icon{background:linear-gradient(135deg,#e8eaf6,#c5cae9)}
.c-purple .card-icon{background:linear-gradient(135deg,#f3e5f5,#e1bee7)}
.c-teal .card-icon{background:linear-gradient(135deg,#e0f2f1,#b2dfdb)}
.c-amber .card-icon{background:linear-gradient(135deg,#fff8e1,#ffecb3)}
.quick-entry{background:var(--card);border-radius:var(--r-lg);padding:16px;margin-bottom:20px;box-shadow:var(--shadow)}
.quick-entry-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px}
.quick-tag{padding:8px 14px;border-radius:20px;font-size:13px;background:var(--bg);color:var(--text-p);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;min-height:44px}
.quick-tag:active{background:var(--primary);color:white;transform:scale(.96)}
.quick-tag .qt-icon{font-size:15px}
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.detail-icon{font-size:36px}
.detail-info{flex:1}
.detail-title{font-size:18px;font-weight:700;margin-bottom:4px}
.detail-sub{font-size:13px;color:var(--text-s)}
.rule-card{background:var(--card);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);position:relative}
.rule-num{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:700;margin-bottom:10px;background:rgba(91,79,207,.1);color:var(--primary)}
.rule-title{font-size:15px;font-weight:600;margin-bottom:10px}
.fav-btn{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s}
.fav-btn:active{transform:scale(.9)}
.fav-btn.faved{color:#f9a825}
.info-box{padding:10px 12px;border-radius:10px;margin:6px 0;font-size:13px;line-height:1.6;display:flex;align-items:flex-start;gap:8px}
.info-box .ib-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.info-box .ib-text{flex:1}
.ib-danger{background:var(--error-bg);border-left:3px solid var(--error);color:#c62828}
.ib-warning{background:var(--warning-bg);border-left:3px solid var(--warning);color:#e65100}
.ib-success{background:var(--success-bg);border-left:3px solid var(--success);color:#2e7d32}
.ib-info{background:var(--info-bg);border-left:3px solid var(--primary);color:#283593}
.dark-mode .ib-danger{color:#ff8a80}
.dark-mode .ib-warning{color:#ffd54f}
.dark-mode .ib-success{color:#a5d6a7}
.dark-mode .ib-info{color:#90caf9}
.related-rules{margin-top:10px;padding-top:10px;border-top:1px dashed var(--divider)}
.related-title{font-size:11px;color:var(--text-h);margin-bottom:6px}
.related-tag{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;background:var(--bg);color:var(--primary);margin:2px 4px 2px 0;cursor:pointer}
.related-tag:active{background:var(--primary);color:white}
.data-table{width:100%;border-collapse:separate;border-spacing:0;margin:10px 0;font-size:13px;border:1px solid var(--divider);border-radius:10px;overflow:hidden}
.data-table th{background:var(--primary);color:white;padding:10px 12px;text-align:left;font-weight:600}
.data-table td{padding:9px 12px;border-bottom:.5px solid var(--divider)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:nth-child(even){background:var(--bg)}
.text-danger{color:var(--error);font-weight:600}
.text-warning{color:#e65100;font-weight:600}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--r-md);padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent;color:var(--text-p)}
.search-bar input::placeholder{color:var(--text-h)}
.search-icon{color:var(--text-h)}
.search-clear{display:none;background:none;border:none;font-size:20px;color:var(--text-h);cursor:pointer;padding:0 4px;line-height:1;min-width:44px;min-height:44px;text-align:center}
.search-clear.show{display:block}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-bar::-webkit-scrollbar{display:none}
.filter-tag{padding:6px 14px;border-radius:20px;font-size:13px;background:var(--card);color:var(--text-s);border:1px solid var(--divider);cursor:pointer;white-space:nowrap;transition:all .2s;min-height:36px;display:flex;align-items:center;gap:4px}
.filter-tag.active{background:var(--primary);color:white;border-color:var(--primary)}
.filter-tag:active{transform:scale(.96)}
.search-suggestions{display:none;margin-bottom:12px;padding:12px 16px;background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow)}
.search-suggestions.show{display:block}
.suggestion-title{font-size:12px;color:var(--text-s);margin-bottom:8px}
.suggestion-tags{display:flex;flex-wrap:wrap;gap:8px}
.suggestion-tags .tag{padding:8px 14px;background:var(--bg);border-radius:16px;font-size:13px;color:var(--text-p);cursor:pointer;transition:all .2s;min-height:44px;display:flex;align-items:center}
.suggestion-tags .tag:active{background:var(--primary);color:white}
.search-history{margin-bottom:12px;padding:12px 16px;background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow)}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.history-title{font-size:12px;color:var(--text-s)}
.history-clear-btn{font-size:12px;color:var(--error);cursor:pointer;min-height:44px;display:flex;align-items:center}
.history-tags{display:flex;flex-wrap:wrap;gap:8px}
.history-tag{padding:6px 12px;background:var(--bg);border-radius:14px;font-size:13px;color:var(--text-s);cursor:pointer;display:flex;align-items:center;gap:4px;min-height:40px}
.search-result{background:var(--card);border-radius:var(--r-md);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:background .15s}
.search-result:active{background:var(--bg)}
.search-result .rule-num{margin-bottom:6px}
.search-result .rule-title{font-size:14px}
.search-result .result-preview{font-size:12px;color:var(--text-s);margin-top:6px;line-height:1.5}
.search-result .result-preview .hl{background:#FEF3C7;color:#92400E;padding:1px 2px;border-radius:2px;font-weight:600}
.dark-mode .search-result .result-preview .hl{background:#5d4e14;color:#ffd54f}
.result-count{font-size:12px;color:var(--text-s);margin-bottom:12px;padding:0 4px}
.tree-container{padding:0 0 20px}
.tree-step{background:var(--card);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.tree-question{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tree-question .tq-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.tree-options{display:flex;flex-direction:column;gap:8px}
.tree-option{padding:12px 14px;border-radius:var(--r-md);background:var(--bg);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;min-height:48px}
.tree-option:active{background:var(--primary);color:white;transform:scale(.98)}
.tree-option .to-arrow{margin-left:auto;color:var(--text-h)}
.tree-result{background:var(--card);border-radius:var(--r-lg);padding:20px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--primary)}
.tree-result-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--primary)}
.tree-result-person{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tree-result-desc{font-size:13px;color:var(--text-s);margin-top:8px}
.tree-back{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--r-md);background:var(--bg);font-size:14px;color:var(--primary);cursor:pointer;font-weight:600;margin-top:8px;min-height:44px}
.tree-back:active{background:var(--primary);color:white}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--divider);display:flex;align-items:stretch;padding-bottom:var(--safe-bottom);z-index:1000}
.dark-mode .bottom-nav{background:rgba(30,30,30,.95)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-h);transition:color .2s;position:relative;min-height:44px}
.nav-item.active{color:var(--primary)}
.nav-item .ni-icon{font-size:22px;line-height:1}
.nav-item .ni-label{font-size:10px;font-weight:500}
.nav-item.active .ni-icon{animation:navBounce .3s ease}
@keyframes navBounce{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.nav-item .ni-badge{position:absolute;top:4px;right:calc(50% - 18px);min-width:16px;height:16px;border-radius:8px;background:var(--error);color:white;font-size:9px;display:none;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
.nav-item .ni-badge.show{display:flex}
.fab{position:fixed;right:20px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 20px);width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(102,126,234,.4);cursor:pointer;z-index:999;transition:transform .2s}
.fab:active{transform:scale(.9)}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 80px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);color:var(--text-p);padding:12px 20px;border-radius:var(--r-md);font-size:14px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.15);transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-h)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px}
.main-content::-webkit-scrollbar{width:0}
@media(min-width:500px){.card-grid{grid-template-columns:repeat(3,1fr)}}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%}.nav-bar,.status-bar,.bottom-nav,.fab,.no-print{display:none!important}.page{display:none!important}}
</style>
</head>

<div class="grid-card c-teal" onclick="openChapter(8)"><div class="card-icon">📊</div><div class="card-title">速查表</div><div class="card-desc">快速查找</div></div>

// ===== 收藏功能（localStorage持久化）=====
var favKey='nc_favs';
function getFavs(){try{return JSON.parse(localStorage.getItem(favKey)||'[]')}catch(e){return[]}}
function saveFavs(f){localStorage.setItem(favKey,JSON.stringify(f))}
function isFaved(ruleNum){return getFavs().indexOf(ruleNum)!==-1}
function toggleFav(ruleNum){
    var f=getFavs(),idx=f.indexOf(ruleNum);
    if(idx===-1){f.push(ruleNum);showToast('已收藏 第'+ruleNum)}
    else{f.splice(idx,1);showToast('已取消收藏')}
    saveFavs(f);updateFavBadge();renderFavPage()
}
function updateFavBadge(){
    var b=document.getElementById('favBadge'),c=getFavs().length;
    b.textContent=c;b.classList.toggle('show',c>0)
}

// ===== 搜索历史（localStorage持久化）=====
var histKey='nc_search_hist';
function getHist(){try{return JSON.parse(localStorage.getItem(histKey)||'[]')}catch(e){return[]}}
function saveHist(h){localStorage.setItem(histKey,JSON.stringify(h))}
function addHist(q){var h=getHist();q=q.trim();if(!q||q.length<2)return;h=h.filter(function(x){return x!==q});h.unshift(q);if(h.length>10)h.pop();saveHist(h)}
function clearHist(){saveHist([]);renderSearchHistory()}

// ===== 深色模式 =====
var darkKey='nc_dark';
function isDark(){return localStorage.getItem(darkKey)==='1'||(!localStorage.getItem(darkKey)&&window.matchMedia('(prefers-color-scheme:dark)').matches)}
function toggleDarkMode(){
    var d=!isDark();localStorage.setItem(darkKey,d?'1':'0');
    document.body.classList.toggle('dark-mode',d);
    document.getElementById('darkBtn').textContent=d?'☀️':'🌙';
    document.querySelector('meta[name="theme-color"]').content=d?'#1e1e1e':'#5b4fcf'
}
if(isDark()){document.body.classList.add('dark-mode');document.addEventListener('DOMContentLoaded',function(){document.getElementById('darkBtn').textContent='☀️'})}

// ===== Toast =====
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

// ===== 时钟 =====
function updateClock(){var d=new Date(),h=d.getHours(),m=d.getMinutes();document.getElementById('clock').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m}
updateClock();setInterval(updateClock,30000);

// ===== 页面切换 =====
var currentTab='home';
function switchTab(page,el){
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    var pid=page==='fav'?'page-fav':page==='tree'?'page-tree':'page-'+page;
    document.getElementById(pid).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
    if(el)el.classList.add('active');
    document.getElementById('navBack').style.display='none';
    document.getElementById('navTitle').textContent=page==='home'?'NC判责标准':page==='search'?'搜索':page==='fav'?'我的收藏':'快速判责';
    currentTab=page;
    if(page==='fav')renderFavPage();
    if(page==='search')renderSearchHistory();
    if(page==='tree')renderTreeHome();
    document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'})
}
function openChapter(n){
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    document.getElementById('page-detail').classList.add('active');
    document.getElementById('navBack').style.display='flex';
    renderChapter(n)
}
function goBack(){
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    document.getElementById('page-home').classList.add('active');
    document.getElementById('navBack').style.display='none';
    document.getElementById('navTitle').textContent='NC判责标准'
}

// ===== 渲染章节 =====
function renderChapter(n){
    var ch=chapters[n];if(!ch)return;
    document.getElementById('navTitle').textContent=ch.title.split('·')[0].trim();
    var html='<div class="detail-header"><div class="detail-icon">'+ch.icon+'</div><div class="detail-info"><div class="detail-title">'+ch.title+'</div><div class="detail-sub">'+ch.sub+'</div></div></div>';
    if(ch.table){
        html+='<div style="background:var(--card);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow);overflow-x:auto"><table class="data-table"><tr><th>场景</th><th>责任</th><th>人员</th></tr>';
        ch.table.forEach(function(r){html+='<tr><td>'+r.scene+'</td><td class="'+(r.duty==='全责'?'text-danger':'text-warning')+'">'+r.duty+'</td><td>'+r.person+'</td></tr>'});
        html+='</table></div>'
    }else{
        ch.rules.forEach(function(rule){
            var faved=isFaved(rule.num);
            html+='<div class="rule-card"><button class="fav-btn'+(faved?' faved':'')+'" onclick="toggleFav(\''+rule.num+'\');this.classList.toggle(\'faved\')">'+(faved?'⭐':'☆')+'</button><div class="rule-num">📌 '+rule.num+'</div><div class="rule-title">'+rule.title+'</div>';
            rule.items.forEach(function(item){
                html+='<div class="info-box ib-'+item.type+'"><span class="ib-icon">'+item.icon+'</span><span class="ib-text">'+item.text+'</span></div>'
            });
            if(rule.related&&rule.related.length>0){
                html+='<div class="related-rules"><div class="related-title">🔗 相关规则</div>';
                rule.related.forEach(function(rn){html+='<span class="related-tag" onclick="jumpToRule('+rn+')">第'+rn+'条</span>'});
                html+='</div>'
            }
            html+='</div>'
        })
    }
    document.getElementById('detailContent').innerHTML=html
}

function jumpToRule(n){
    for(var k in chapters){var ch=chapters[k];if(ch.rules){for(var i=0;i<ch.rules.length;i++){if(ch.rules[i].num==='第'+n+'条'){openChapter(parseInt(k));return}}}}
    showToast('未找到第'+n+'条')
}

var pinyinMap={'暴':'bao','力':'li','操':'cao','作':'zuo','踢':'ti','坐':'zuo','踩':'cai','抛':'pao','扔':'reng','甩':'shuai','拖':'tuo','货':'huo','掉':'diao','破':'po','损':'sun','拦':'lan','截':'jie','码':'ma','放':'fang','重':'zhong','轻':'qing','长':'chang','短':'duan','干':'gan','湿':'shi','分':'fen','离':'li','薄':'bao','集':'ji','包':'bao','袋':'dai','翻':'fan','笼':'long','车':'che','拣':'jian','错':'cuo','滑':'hua','槽':'cao','封':'feng','交':'jiao','接':'jie','堵':'du','疏':'shu','通':'tong','异':'yi','常':'chang','回':'hui','流':'liu','人':'ren','为':'wei','报':'bao','备':'bei','酒':'jiu','水':'shui','特':'te','安':'an','准':'zhun','达':'da','网':'wang','编':'bian','织':'zhi','桶':'tong','柱':'zhu','玻':'bo','璃':'li','防':'fang','水':'shui','丢':'diu','延':'yan','误':'wu','三':'san','无':'wu','上':'shang','台':'tai','前':'qian','置':'zhi','买':'mai','赔':'pei','高':'gao','值':'zhi','物':'wu','品':'pin','不可抗力':'bukangkangli','T20':'t20'};
var currentFilter='all';
var searchTimer=null;

function setFilter(f,el){
    currentFilter=f;
    document.querySelectorAll('.filter-tag').forEach(function(t){t.classList.remove('active')});
    if(el)el.classList.add('active');
    var q=document.getElementById('searchInput').value;
    if(q)doSearch(q)
}

function doSearch(q){
    q=q.trim();
    var c=document.getElementById('searchResults'),cb=document.getElementById('searchClearBtn'),sg=document.getElementById('searchSuggestions');
    if(q&&cb)cb.classList.add('show');else if(cb)cb.classList.remove('show');
    if(sg)sg.classList.remove('show');
    if(!q){c.innerHTML='';renderSearchHistory();return}
    if(searchTimer)clearTimeout(searchTimer);
    searchTimer=setTimeout(function(){performSearch(q,c)},200)
}

function matchPinyin(text,q){
    var py=text.split('').map(function(c){return pinyinMap[c]||c}).join('');
    return py.toLowerCase().indexOf(q.toLowerCase())!==-1
}

function performSearch(q,container){
    var results=[];
    var filterTags=currentFilter==='all'?null:currentFilter==='new'?['new']:currentFilter==='full'?['full']:currentFilter==='shared'?['shared']:null;
    Object.keys(chapters).forEach(function(key){
        var ch=chapters[key];
        if(ch.rules){
            ch.rules.forEach(function(rule){
                if(filterTags){
                    var hasTag=rule.tags&&rule.tags.some(function(t){return filterTags.indexOf(t)!==-1});
                    if(!hasTag)return
                }
                var ruleText=rule.num+' '+rule.title;
                rule.items.forEach(function(item){ruleText+=' '+item.text});
                if(ruleText.toLowerCase().indexOf(q.toLowerCase())!==-1||matchPinyin(ruleText,q)){
                    var preview=rule.items.map(function(it){return it.text}).join('；');
                    results.push({key:key,ch:ch,rule:rule,preview:preview})
                }
            })
        }
        if(ch.table){
            ch.table.forEach(function(row){
                var rowText=row.scene+' '+row.duty+' '+row.person;
                if(rowText.toLowerCase().indexOf(q.toLowerCase())!==-1||matchPinyin(rowText,q)){
                    results.push({key:key,ch:ch,row:row,preview:row.scene+' → '+row.duty+'：'+row.person})
                }
            })
        }
    });
    addHist(q);
    if(results.length===0){
        container.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">未找到相关内容</div></div>';
        return
    }
    var html='<div class="result-count">找到 '+results.length+' 个结果</div>';
    results.forEach(function(r,i){
        var title=r.rule?r.rule.num+' '+r.rule.title:(r.row?r.row.scene:'');
        title=highlightText(title,q);
        var preview=r.preview?highlightText(truncate(r.preview,60),q):'';
        var chInfo='<span style="font-size:12px;color:var(--text-s)">'+r.ch.icon+' '+r.ch.title.split('·')[0].trim()+'</span>';
        html+='<div class="search-result" onclick="openSearchResult('+r.key+')"><div class="rule-num">'+chInfo+'</div><div class="rule-title">'+title+'</div>'+(preview?'<div class="result-preview">'+preview+'</div>':'')+'</div>'
    });
    container.innerHTML=html
}

function highlightText(text,keyword){
    if(!keyword)return text;
    var idx=text.toLowerCase().indexOf(keyword.toLowerCase());
    if(idx===-1)return text;
    return text.substring(0,idx)+'<span class="hl">'+text.substring(idx,idx+keyword.length)+'</span>'+text.substring(idx+keyword.length)
}
function truncate(s,n){return s.length>n?s.substring(0,n)+'…':s}

function openSearchResult(key){openChapter(parseInt(key))}
function clearSearch(){var i=document.getElementById('searchInput');if(i){i.value='';doSearch('');i.focus()}}
function applySuggestion(text){var i=document.getElementById('searchInput');if(i){i.value=text;doSearch(text)}}
function handleSearchKey(e){if(e.key==='Escape')clearSearch()}

var currentTree=null;
var treePath=[];

function openDecisionTree(type){
    currentTree=type;treePath=[];
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    document.getElementById('page-tree').classList.add('active');
    document.getElementById('navBack').style.display='flex';

function renderTreeHome(){
    var html='<div class="detail-header"><div class="detail-icon">🌳</div><div class="detail-info"><div class="detail-title">快速判责决策树</div><div class="detail-sub">选择场景，快速定位责任归属</div></div></div>';
    html+='<div style="display:flex;flex-direction:column;gap:12px">';
    Object.keys(decisionTrees).forEach(function(k){
        var t=decisionTrees[k];
        html+='<div class="grid-card c-blue" style="display:flex;align-items:center;gap:12px" onclick="openDecisionTree(\''+k+'\')"><div style="font-size:28px">'+t.title.split(' ')[0]+'</div><div><div class="card-title">'+t.title.substring(t.title.indexOf(' ')+1)+'</div><div class="card-desc">点击开始判断</div></div></div>'
    });
    html+='</div>';
    document.getElementById('treeContent').innerHTML=html
}

function renderTreeStep(stepIdx){
    if(!currentTree)return;
    var tree=decisionTrees[currentTree];
    var step=tree.steps[stepIdx];
    if(!step)return;
    var html='<div style="margin-bottom:16px;font-size:14px;color:var(--text-s)">'+tree.title+'</div>';
    html+='<div class="tree-step"><div class="tree-question"><span class="tq-num">'+(treePath.length+1)+'</span>'+step.q+'</div><div class="tree-options">';
    step.opts.forEach(function(opt){
        if(opt.result){
            html+='<div class="tree-option" onclick="showTreeResult('+stepIdx+',\''+opt.label.replace(/'/g,"\\'")+'\')">'+opt.label+'<span class="to-arrow">→</span></div>'
        }else if(opt.next){
            html+='<div class="tree-option" onclick="goTreeNext(\''+opt.next+'\')">'+opt.label+'<span class="to-arrow">→</span></div>'
        }
    });
    html+='</div></div>';
    if(treePath.length>0){
        html+='<div class="tree-back" onclick="goTreeBack()">← 返回上一步</div>'
    }
    document.getElementById('treeContent').innerHTML=html
}

function goTreeNext(nextId){
    for(var i=0;i<decisionTrees[currentTree].steps.length;i++){
        if(decisionTrees[currentTree].steps[i].id===nextId){
            treePath.push(i);renderTreeStep(i);return
        }
    }
}

function goTreeBack(){
    if(treePath.length>0){treePath.pop();renderTreeStep(treePath.length>0?treePath[treePath.length-1]:0)}
}

function showTreeResult(stepIdx,optLabel){
    var step=decisionTrees[currentTree].steps[stepIdx];
    var result=null;
    step.opts.forEach(function(o){if(o.label===optLabel&&o.result)result=o.result});
    if(!result)return;
    var dutyColor=result.title.indexOf('全责')!==-1?'var(--error)':result.title.indexOf('共责')!==-1?'var(--warning)':'var(--success)';
    var html='<div style="margin-bottom:16px;font-size:14px;color:var(--text-s)">'+decisionTrees[currentTree].title+'</div>';
    html+='<div class="tree-result"><div class="tree-result-title" style="color:'+dutyColor+'">'+result.title+'</div><div class="tree-result-person">👤 责任人：<strong>'+result.person+'</strong></div><div class="tree-result-desc">'+result.desc+'</div></div>';
    html+='<div class="tree-back" onclick="goTreeBack()">← 重新判断</div>';
    html+='<div class="tree-back" onclick="openDecisionTree(\''+currentTree+'\')">🔄 从头开始</div>';
    document.getElementById('treeContent').innerHTML=html
}
