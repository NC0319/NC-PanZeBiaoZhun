<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NC判责标准</title>
    <style>
        :root {
            --primary: #5b4fcf;
            --primary-light: #818cf8;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #757575;
            --text-hint: #bdbdbd;
            --divider: #e0e0e0;
            --success: #43a047;
            --warning: #f9a825;
            --error: #e53935;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: 64px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { height:100%; overflow:hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height:100%;
            display:flex; flex-direction:column;
            overflow:hidden;
            -webkit-font-smoothing:antialiased;
        }

        /* ===== 顶部状态栏 ===== */
        .status-bar {
            height:44px; padding-top:var(--safe-top);
            background: var(--card);
            display:flex; align-items:center; justify-content:space-between;
            padding-left:16px; padding-right:16px;
            font-size:12px; color:var(--text-secondary);
            border-bottom:0.5px solid var(--divider);
            flex-shrink:0;
            z-index:100;
        }
        .status-left { display:flex; align-items:center; gap:4px; }
        .status-right { display:flex; align-items:center; gap:6px; }
        .battery { width:22px; height:11px; border:1.5px solid var(--text-secondary); border-radius:2px; position:relative; }
        .battery::after { content:''; position:absolute; right:-4px; top:2.5px; width:2px; height:4px; background:var(--text-secondary); border-radius:0 1px 1px 0; }
        .battery-level { height:100%; width:70%; background:var(--success); border-radius:1px; }

        /* ===== 顶部导航栏 ===== */
        .nav-bar {
            height:52px; background:var(--card);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 16px;
            border-bottom:0.5px solid var(--divider);
            flex-shrink:0;
            z-index:100;
        }
        .nav-back { width:32px; height:32px; display:flex; align-items:center; justify-content:center; }
        .nav-title { font-size:17px; font-weight:600; position:absolute; left:50%; transform:translateX(-50%); }
        .nav-right { width:32px; height:32px; display:flex; align-items:center; justify-content:center; }

        /* ===== 主内容区 ===== */
        .main-content {
            flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
            padding-bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px);
        }
        .page { display:none; padding:16px; min-height:100%; }
        .page.active { display:block; animation:fadeIn .3s ease; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ===== 首页（卡片网格）===== */
        .hero-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius:20px; padding:24px 20px; margin-bottom:20px;
            color:white; position:relative; overflow:hidden;
        }
        .hero-card::after {
            content:''; position:absolute; right:-30px; bottom:-30px;
            width:120px; height:120px; border-radius:50%;
            background:rgba(255,255,255,0.1);
        }
        .hero-emoji { font-size:48px; margin-bottom:12px; display:block; }
        .hero-title { font-size:24px; font-weight:700; margin-bottom:6px; }
        .hero-sub { font-size:14px; opacity:0.9; }
        .hero-version {
            display:inline-block; margin-top:12px;
            padding:4px 12px; border-radius:12px;
            background:rgba(255,255,255,0.2); font-size:12px;
        }

        .section-title {
            font-size:13px; font-weight:600; color:var(--text-secondary);
            text-transform:uppercase; letter-spacing:0.5px;
            margin:20px 0 12px; padding-left:4px;
        }

        /* ColorOS 风格卡片网格 */
        .card-grid {
            display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;
        }
        .grid-card {
            background:var(--card); border-radius:16px; padding:20px 16px;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
            cursor:pointer; transition:transform .2s, box-shadow .2s;
            position:relative; overflow:hidden;
        }
        .grid-card:active { transform:scale(0.97); box-shadow:0 1px 4px rgba(0,0,0,0.08); }
        .card-icon {
            width:48px; height:48px; border-radius:14px;
            display:flex; align-items:center; justify-content:center;
            font-size:24px; margin-bottom:12px;
        }
        .card-title { font-size:15px; font-weight:600; margin-bottom:4px; }
        .card-desc { font-size:12px; color:var(--text-secondary); line-height:1.3; }
        .card-badge {
            position:absolute; top:10px; right:10px;
            font-size:10px; padding:2px 8px; border-radius:8px;
            font-weight:600;
        }
        .badge-new { background:#fff3e0; color:#e65100; }

        /* 卡片彩色背景 */
        .c-blue .card-icon { background:linear-gradient(135deg,#e8eaf6,#c5cae9); }
        .c-orange .card-icon { background:linear-gradient(135deg,#fff3e0,#ffe0b2); }
        .c-green .card-icon { background:linear-gradient(135deg,#e8f5e9,#c8e6c9); }
        .c-pink .card-icon { background:linear-gradient(135deg,#fce4ec,#f8bbd0); }
        .c-red .card-icon { background:linear-gradient(135deg,#ffebee,#ffcdd2); }
        .c-indigo .card-icon { background:linear-gradient(135deg,#e8eaf6,#c5cae9); }
        .c-purple .card-icon { background:linear-gradient(135deg,#f3e5f5,#e1bee7); }
        .c-teal .card-icon { background:linear-gradient(135deg,#e0f2f1,#b2dfdb); }

        /* ===== 详情页 ===== */
        .detail-header {
            display:flex; align-items:center; gap:14px;
            margin-bottom:20px; padding:16px;
            background:var(--card); border-radius:16px;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .detail-icon { font-size:36px; }
        .detail-info { flex:1; }
        .detail-title { font-size:18px; font-weight:700; margin-bottom:4px; }
        .detail-sub { font-size:13px; color:var(--text-secondary); }

        .rule-card {
            background:var(--card); border-radius:16px; padding:16px;
            margin-bottom:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .rule-num {
            display:inline-block; padding:3px 10px; border-radius:8px;
            font-size:11px; font-weight:700; margin-bottom:10px;
            background:rgba(91,79,207,0.1); color:var(--primary);
        }
        .rule-title { font-size:15px; font-weight:600; margin-bottom:10px; }

        .info-box {
            padding:10px 12px; border-radius:10px; margin:6px 0;
            font-size:13px; line-height:1.6;
        }
        .ib-danger { background:#ffebee; border-left:3px solid #e53935; color:#c62828; }
        .ib-warning { background:#fff8e1; border-left:3px solid #f9a825; color:#e65100; }
        .ib-success { background:#e8f5e9; border-left:3px solid #43a047; color:#2e7d32; }
        .ib-info { background:#e3f2fd; border-left:3px solid #5b4fcf; color:#283593; }

        .data-table {
            width:100%; border-collapse:separate; border-spacing:0;
            margin:10px 0; font-size:13px;
            border:1px solid var(--divider); border-radius:10px; overflow:hidden;
        }
        .data-table th {
            background:var(--primary); color:white;
            padding:10px 12px; text-align:left; font-weight:600;
        }
        .data-table td { padding:9px 12px; border-bottom:0.5px solid var(--divider); }
        .data-table tr:last-child td { border-bottom:none; }
        .data-table tr:nth-child(even) { background:var(--bg); }
        .text-danger { color:#e53935; font-weight:600; }
        .text-warning { color:#e65100; font-weight:600; }

        /* ===== 搜索页 ===== */
        .search-bar {
            display:flex; align-items:center; gap:10px;
            background:var(--card); border-radius:12px;
            padding:10px 14px; margin-bottom:16px;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .search-bar input {
            flex:1; border:none; outline:none; font-size:15px;
            font-family:inherit; background:transparent; color:var(--text-primary);
        }
        .search-bar input::placeholder { color:var(--text-hint); }
        .search-icon { color:var(--text-hint); }
        .search-clear {
            display:none; background:none; border:none;
            font-size:20px; color:var(--text-hint);
            cursor:pointer; padding:0 4px;
            line-height:1;
        }
        .search-clear.show { display:block; }

        .search-suggestions {
            display:none; margin-bottom:16px;
            padding:12px 16px;
            background:var(--card);
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .search-suggestions.show { display:block; }
        .suggestion-title {
            font-size:12px; color:var(--text-secondary);
            margin-bottom:8px;
        }
        .suggestion-tags { display:flex; flex-wrap:wrap; gap:8px; }
        .suggestion-tags .tag {
            padding:6px 12px; background:var(--bg);
            border-radius:16px; font-size:13px;
            color:var(--text-primary);
            cursor:pointer; transition:all .2s;
        }
        .suggestion-tags .tag:active { background:var(--primary); color:white; }

        .search-result {
            background:var(--card); border-radius:12px; padding:14px;
            margin-bottom:8px; box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .search-result .rule-num { margin-bottom:6px; }
        .search-result .rule-title { font-size:14px; }

        /* ===== 底部导航栏（ColorOS风格）===== */
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0;
            height:var(--nav-height);
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-top:0.5px solid var(--divider);
            display:flex; align-items:stretch;
            padding-bottom:var(--safe-bottom);
            z-index:1000;
        }
        .nav-item {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:3px;
            cursor:pointer; color:var(--text-hint);
            transition:color .2s; position:relative;
        }
        .nav-item.active { color:var(--primary); }
        .nav-item .ni-icon { font-size:22px; line-height:1; }
        .nav-item .ni-label { font-size:10px; font-weight:500; }
        .nav-item.active .ni-icon { animation:navBounce .3s ease; }
        @keyframes navBounce {
            0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)}
        }

        /* ===== 浮动按钮 ===== */
        .fab {
            position:fixed; right:20px; bottom:calc(var(--nav-height) + var(--safe-bottom) + 20px);
            width:52px; height:52px; border-radius:16px;
            background:linear-gradient(135deg, #667eea, #764ba2);
            color:white; display:flex; align-items:center; justify-content:center;
            font-size:22px; box-shadow:0 4px 16px rgba(102,126,234,0.4);
            cursor:pointer; z-index:999;
            transition:transform .2s;
        }
        .fab:active { transform:scale(0.9); }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align:center; padding:60px 20px; color:var(--text-hint);
        }
        .empty-icon { font-size:48px; margin-bottom:12px; }
        .empty-text { font-size:15px; }

        /* ===== 滚动条 ===== */
        .main-content::-webkit-scrollbar { width:0; }

        @media(min-width:500px) {
            .card-grid { grid-template-columns:repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-left">
            <span id="clock">9:41</span>
        </div>
        <div class="status-right">
            <span>📶</span><span>📡</span>
            <div class="battery"><div class="battery-level"></div></div>
        </div>
    </div>

    <!-- 导航栏 -->
    <div class="nav-bar" id="navBar">
        <div class="nav-back" id="navBack" onclick="goBack()" style="display:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="nav-title" id="navTitle">NC判责标准</div>
        <div class="nav-right"></div>
    </div>

    <!-- 主内容 -->
    <div class="main-content" id="mainContent">

        <!-- 首页 -->
        <div class="page active" id="page-home">
            <div class="hero-card">
                <span class="hero-emoji">📋</span>
                <div class="hero-title">NC判责标准</div>
                <div class="hero-sub">物流操作责任认定规范</div>
                <span class="hero-version">V1.0 · 8章24条</span>
            </div>

            <div class="section-title">全部章节</div>
            <div class="card-grid">
                <div class="grid-card c-blue" onclick="openChapter(1)">
                    <div class="card-icon">📦</div>
                    <div class="card-title">搬运操作</div>
                    <div class="card-desc">第1-3条</div>
                </div>
                <div class="grid-card c-orange" onclick="openChapter(2)">
                    <div class="card-icon">⭐</div>
                    <div class="card-title">特殊订单</div>
                    <div class="card-desc">第4条</div>
                </div>
                <div class="grid-card c-green" onclick="openChapter(3)">
                    <div class="card-icon">🚚</div>
                    <div class="card-title">码放装载</div>
                    <div class="card-desc">第5-8条</div>
                </div>
                <div class="grid-card c-pink" onclick="openChapter(4)">
                    <div class="card-icon">🔄</div>
                    <div class="card-title">分拣交接</div>
                    <div class="card-desc">第9-11条</div>
                </div>
                <div class="grid-card c-red" onclick="openChapter(5)">
                    <div class="card-icon">🧹</div>
                    <div class="card-title">现场管理</div>
                    <div class="card-desc">第12-13条</div>
                </div>
                <div class="grid-card c-indigo" onclick="openChapter(6)">
                    <div class="card-icon">⚠️</div>
                    <div class="card-title">异常处理</div>
                    <div class="card-desc">第14-21条</div>
                </div>
                <div class="grid-card c-purple" onclick="openChapter(7)">
                    <div class="card-icon">🆕</div>
                    <div class="card-title">补充操作规范</div>
                    <div class="card-desc">第22-24条</div>
                    <div class="card-badge badge-new">NEW</div>
                </div>
                <div class="grid-card c-teal" onclick="openChapter(8)">
                    <div class="card-icon">📊</div>
                    <div class="card-title">速查表</div>
                    <div class="card-desc">快速查找</div>
                </div>
            </div>
        </div>

        <!-- 章节详情页 -->
        <div class="page" id="page-detail">
            <div id="detailContent"></div>
        </div>

        <!-- 搜索页 -->
        <div class="page" id="page-search">
            <div class="search-bar">
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
                </span>
                <input type="text" id="searchInput" placeholder="搜索规则…" oninput="doSearch(this.value)" onkeydown="handleSearchKeydown(event)">
                <button class="search-clear" id="searchClearBtn" onclick="clearSearch()">×</button>
            </div>
            <div class="search-suggestions" id="searchSuggestions">
                <div class="suggestion-title">热门搜索</div>
                <div class="suggestion-tags">
                    <span class="tag" onclick="applySuggestion('暴力')">暴力操作</span>
                    <span class="tag" onclick="applySuggestion('掉货')">掉货</span>
                    <span class="tag" onclick="applySuggestion('破损')">破损</span>
                    <span class="tag" onclick="applySuggestion('干湿')">干湿分离</span>
                    <span class="tag" onclick="applySuggestion('轻薄')">轻薄件</span>
                    <span class="tag" onclick="applySuggestion('拦截')">拦截</span>
                </div>
            </div>
            <div id="searchResults"></div>
        </div>

    </div>

    <!-- 浮动按钮 -->
    <div class="fab" onclick="scrollToTop()" title="回到顶部">⬆</div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home',this)">
            <div class="ni-icon">🏠</div>
            <div class="ni-label">首页</div>
        </div>
        <div class="nav-item" onclick="switchTab('search',this)">
            <div class="ni-icon">🔍</div>
            <div class="ni-label">搜索</div>
        </div>
        <div class="nav-item" onclick="showFavorites()">
            <div class="ni-icon">⭐</div>
            <div class="ni-label">收藏</div>
        </div>
        <div class="nav-item" onclick="showProfile()">
            <div class="ni-icon">👤</div>
            <div class="ni-label">我的</div>
        </div>
    </div>

    <script>
        // 时钟
        function updateClock(){var d=new Date();var h=d.getHours(),m=d.getMinutes();document.getElementById('clock').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m}updateClock();setInterval(updateClock,30000);

        // 页面切换
        function switchTab(page, el){
            document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
            document.getElementById('page-'+page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
            if(el) el.classList.add('active');
            if(page==='home'){document.getElementById('navBack').style.display='none';document.getElementById('navTitle').textContent='NC判责标准'}
        }

        // 打开章节
        function openChapter(n){
            document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
            document.getElementById('page-detail').classList.add('active');
            document.getElementById('navBack').style.display='flex';
            renderChapter(n);
        }

        function goBack(){
            document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
            document.getElementById('page-home').classList.add('active');
            document.getElementById('navBack').style.display='none';
            document.getElementById('navTitle').textContent='NC判责标准';
        }

        // 渲染章节内容
        var chapters = {
            1: {
                icon:'📦', title:'第一章 · 搬运操作', sub:'第1-3条',
                rules:[
                    {num:'第1条', title:'严禁暴力操作', items:[
                        {type:'danger', text:'严禁：踢货、坐货、踩货、抛货、扔货'},
                        {type:'danger', text:'严禁：直接在地上拖拽快递货物（距离标准：20cm）'},
                        {type:'danger', text:'严禁：集包袋直接拖地搬运（空袋除外）'},
                        {type:'success', text:'正确：使用托盘、笼车、周转框等容器搬运'},
                        {type:'warning', text:'后果：被AI抓拍 → 面谈 + 承担所有异常关联责任'}
                    ]},
                    {num:'第2条', title:'投货操作标准', items:[
                        {type:'success', text:'面单朝上依次投放，不能货物重叠'},
                        {type:'warning', text:'未按标准导致丢失或延误 → 投货人员承担责任'}
                    ]},
                    {num:'第3条', title:'破损拦截机制', items:[
                        {type:'warning', text:'发现破损 → 及时拦截，1小时内拉至异常区报备'},
                        {type:'danger', text:'未拦截导致异常挂责 → 投货人员承担责任'}
                    ]}
                ]
            },
            2: {
                icon:'⭐', title:'第二章 · 特殊订单', sub:'第4条',
                rules:[
                    {num:'第4条', title:'京准达特安等特殊订单', items:[
                        {type:'info', text:'京准达=准时送达；特安=特殊安全保障'},
                        {type:'success', text:'第一时间及时交接至各条线，不允许滞留'},
                        {type:'danger', text:'超时未交接导致延误 → 转货人员承担后续责任'}
                    ]}
                ]
            },
            3: {
                icon:'🚚', title:'第三章 · 码放与装载', sub:'第5-8条',
                rules:[
                    {num:'第5条', title:'码放三不原则', items:[
                        {type:'success', text:'1️⃣ 大不压小 — 大箱子不压在小箱子上'},
                        {type:'success', text:'2️⃣ 重不压轻 — 重货在下，轻货在上'},
                        {type:'success', text:'3️⃣ 长不压短 — 长条货放下面或侧面'},
                        {type:'warning', text:'🍷 酒水类码放高度不能超过1.2米'},
                        {type:'danger', text:'未按标准操作导致运输破损 → 码板人员承担责任'}
                    ]},
                    {num:'第6条', title:'集包袋操作规范', items:[
                        {type:'success', text:'在监控下及时翻袋，确保没遗漏'},
                        {type:'danger', text:'未翻袋或不规范 → 需承担相应责任'}
                    ]},

        function renderChapter(n){
            var ch = chapters[n];
            if(!ch) return;
            document.getElementById('navTitle').textContent = ch.title.split('·')[0].trim();
            var html = '<div class="detail-header"><div class="detail-icon">'+ch.icon+'</div><div class="detail-info"><div class="detail-title">'+ch.title+'</div><div class="detail-sub">'+ch.sub+'</div></div></div>';

            if(ch.table){
                html += '<div style="background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow-x:auto"><table class="data-table"><tr><th>场景</th><th>责任</th><th>人员</th></tr>';
                ch.table.forEach(function(r){html+='<tr><td>'+r.scene+'</td><td class="'+(r.duty==='全责'?'text-danger':'text-warning')+'">'+r.duty+'</td><td>'+r.person+'</td></tr>'});
                html += '</table></div>';
            } else {
                ch.rules.forEach(function(rule){
                    html += '<div class="rule-card"><div class="rule-num">'+rule.num+'</div><div class="rule-title">'+rule.title+'</div>';
                    rule.items.forEach(function(item){
                        var cls = 'ib-' + item.type;
                        html += '<div class="info-box '+cls+'">'+item.text+'</div>';
                    });
                    html += '</div>';
                });
            }
            document.getElementById('detailContent').innerHTML = html;
        }

        // 搜索（优化版）
        var searchHistory = [];
        var currentSearchResults = []; // 存储当前搜索结果
        
        function doSearch(q){
            q = q.trim().toLowerCase();
            var container = document.getElementById('searchResults');
            var clearBtn = document.getElementById('searchClearBtn');
            var suggestions = document.getElementById('searchSuggestions');
            
            // 显示/隐藏清除按钮
            if(q && clearBtn) clearBtn.classList.add('show');
            else if(clearBtn) clearBtn.classList.remove('show');
            
            // 隐藏建议
            if(suggestions) suggestions.classList.remove('show');
            
            if(!q){container.innerHTML=''; return;}
            
            var results = [];
            Object.keys(chapters).forEach(function(key){
                var ch = chapters[key];
                ch.rules.forEach(function(rule){
                    if(rule.title.toLowerCase().indexOf(q)!==-1 || rule.num.toLowerCase().indexOf(q)!==-1 || JSON.stringify(rule.items).toLowerCase().indexOf(q)!==-1){
                        results.push({key:key, ch:ch, rule:rule});
                    }
                });
                if(ch.table){
                    ch.table.forEach(function(row){
                        if(row.scene.toLowerCase().indexOf(q)!==-1 || row.person.toLowerCase().indexOf(q)!==-1){
                            results.push({key:key, ch:ch, row:row});
                        }
                    });
                }
            });
            
            // 保存搜索结果
            currentSearchResults = results;
            
            if(results.length===0){
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">未找到相关内容</div><div class="empty-hint">试试其他关键词，如"暴力"、"掉货"</div></div>';
                return;
            }
            
            // 显示结果数量
            var resultCount = '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;padding:0 4px;">找到 '+results.length+' 个结果</div>';
            
            var html = resultCount;
            results.forEach(function(r, idx){
                var title = r.rule ? r.rule.num+' '+r.rule.title : (r.row ? r.row.scene : '');
                // 高亮匹配文字
                title = highlightText(title, q);
                var chapterInfo = '<span style="font-size:12px;color:var(--text-secondary);">'+r.ch.icon+' '+r.ch.title+'</span>';
                
                html += '<div class="search-result" onclick="openSearchResult('+idx+')">'+
                    '<div class="rule-num">'+chapterInfo+'</div>'+
                    '<div class="rule-title">'+title+'</div>'+
                '</div>';
            });
            container.innerHTML = html;
            
            // 保存到搜索历史
            if(q.length > 1 && searchHistory.indexOf(q)===-1){
                searchHistory.unshift(q);
                if(searchHistory.length > 10) searchHistory.pop();
            }
        }
        
        // 高亮文字
        function highlightText(text, keyword){
            if(!keyword) return text;
            var idx = text.toLowerCase().indexOf(keyword.toLowerCase());
            if(idx === -1) return text;
            return text.substring(0, idx) + '<span style="background:#FEF3C7;color:#92400E;padding:1px 2px;border-radius:2px;font-weight:600;">' + text.substring(idx, idx+keyword.length) + '</span>' + text.substring(idx+keyword.length);
        }
        
        // 打开搜索结果
        function openSearchResult(idx){
            if(!currentSearchResults[idx]) return;
            var result = currentSearchResults[idx];
            if(result.key) showDetail(result.key);
        }
        
        // 清除搜索
        function clearSearch(){
            var input = document.getElementById('searchInput');
            if(input){
                input.value = '';
                doSearch('');
                input.focus();
            }
        }
        
        // 应用搜索建议
        function applySuggestion(text){
            var input = document.getElementById('searchInput');
            if(input){
                input.value = text;
                doSearch(text);
            }
        }
        
        // 搜索框键盘事件
        function handleSearchKeydown(event){
            if(event.key === 'Escape'){
                clearSearch();
            }
        }
        
        // 显示搜索建议
        document.addEventListener('DOMContentLoaded', function(){
            var searchInput = document.getElementById('searchInput');
            if(searchInput){
                searchInput.addEventListener('focus', function(){
                    if(this.value.trim() === ''){
                        var suggestions = document.getElementById('searchSuggestions');
                        if(suggestions) suggestions.classList.add('show');
                    }
                });
                
                searchInput.addEventListener('blur', function(){
                    setTimeout(function(){
                        var suggestions = document.getElementById('searchSuggestions');
                        if(suggestions) suggestions.classList.remove('show');
                    }, 200);
                });
            }
        });

        // 收藏 & 我的（占位）
        function showFavorites(){alert('收藏功能开发中');}
        function showProfile(){alert('个人中心开发中');}

        // 回到顶部
        function scrollToTop(){document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});}
