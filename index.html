<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4F46E5">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NC判责标准 V8.0</title>
<style>
/* ========== 兼容性回退 ========== */
@supports not (backdrop-filter:blur(1px)){
  .nav-bar,.status-bar,.modal-sheet,.dash-item,.rule-card,.quick-entry,.detail-header,.update-banner{background:var(--card-solid)!important}
}
@supports not (env(safe-area-inset-top:0px)){
  :root{--safe-top:20px;--safe-bottom:0px}
}

/* ========== CSS Variables ========== */
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --primary-dark: #3730A3;
  --accent: #F97316;
  --accent-light: #FB923C;
  --bg: #F0F4FF;
  --card: rgba(255,255,255,0.8);
  --card-solid: #ffffff;
  --text-p: #1E1B4B;
  --text-s: #6B7280;
  --text-h: #9CA3AF;
  --divider: rgba(0,0,0,0.07);
  --success: #10B981;
  --success-bg: rgba(209,250,229,0.6);
  --warning: #F59E0B;
  --warning-bg: rgba(254,243,199,0.6);
  --error: #EF4444;
  --error-bg: rgba(254,226,226,0.6);
  --info-bg: rgba(219,234,254,0.6);
  --glass-border: rgba(255,255,255,0.6);
  --safe-top: env(safe-area-inset-top,20px);
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --nav-h: 64px;
  --shadow-sm: 0 1px 3px rgba(79,70,229,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(79,70,229,0.10), 0 2px 6px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 40px rgba(79,70,229,0.16), 0 4px 16px rgba(0,0,0,0.08);
  --shadow-xl: 0 20px 60px rgba(79,70,229,0.20), 0 8px 24px rgba(0,0,0,0.10);
  --r-xl: 20px;
  --r-lg: 16px;
  --r-md: 12px;
  --r-sm: 8px;
  --r-pill: 999px;
  --ease: cubic-bezier(0.4,0,0.2,1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F172A;
    --card: rgba(30,41,75,0.85);
    --card-solid: #1E293B;
    --text-p: #F1F5F9;
    --text-s: #94A3B8;
    --text-h: #475569;
    --divider: rgba(255,255,255,0.08);
    --success-bg: rgba(16,185,129,0.15);
    --warning-bg: rgba(245,158,11,0.15);
    --error-bg: rgba(239,68,68,0.15);
    --info-bg: rgba(59,130,246,0.15);
    --glass-border: rgba(255,255,255,0.08);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.45);
    --shadow-xl: 0 20px 60px rgba(0,0,0,0.55);
  }
}
.dark-mode {
  --bg: #0F172A;
  --card: rgba(30,41,75,0.85);
  --card-solid: #1E293B;
  --text-p: #F1F5F9;
  --text-s: #94A3B8;
  --text-h: #475569;
  --divider: rgba(255,255,255,0.08);
  --success-bg: rgba(16,185,129,0.15);
  --warning-bg: rgba(245,158,11,0.15);
  --error-bg: rgba(239,68,68,0.15);
  --info-bg: rgba(59,130,246,0.15);
  --glass-border: rgba(255,255,255,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.45);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.55);
}
/* ========== Reset ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text-p);
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
  position:relative;
}
/* Dot grid BG */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(circle, var(--text-h) 1.2px, transparent 1.2px);
  background-size:26px 26px;
  opacity:0.2;
  z-index:0;
  pointer-events:none;
}
body.dark-mode::before{opacity:0.06}
/* ========== Status Bar ========== */
.status-bar{
  height:44px;padding-top:var(--safe-top);
  background:var(--card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:16px;padding-right:16px;
  font-size:12px;color:var(--text-s);
  flex-shrink:0;z-index:100;position:relative;
}
.status-left,.status-right{display:flex;align-items:center;gap:4px}
.battery{width:22px;height:11px;border:1.5px solid var(--text-s);border-radius:2px;position:relative}
.battery::after{content:'';position:absolute;right:-4px;top:2.5px;width:2px;height:4px;background:var(--text-s);border-radius:0 1px 1px 0}
.battery-level{height:100%;width:70%;background:var(--success);border-radius:1px}
/* ========== Nav Bar ========== */
.nav-bar{
  height:52px;
  background:var(--card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8px 0 4px;
  flex-shrink:0;z-index:100;position:relative;
}
.nav-back{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:var(--r-sm);
  color:var(--text-p);
  transition:background .15s,transform .15s;
}
.nav-back:active{background:rgba(79,70,229,0.1);transform:scale(0.9)}
.nav-title{font-size:17px;font-weight:700;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;max-width:60%;overflow:hidden;text-overflow:ellipsis}
.nav-right{display:flex;align-items:center;gap:2px}
.nav-btn{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;border-radius:var(--r-sm);
  color:var(--text-p);transition:background .15s,transform .15s;
}
.nav-btn:active{background:rgba(79,70,229,0.1);transform:scale(0.9)}
.nav-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* ========== Main Content ========== */
.main-content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);
  position:relative;z-index:1;
}
.main-content::-webkit-scrollbar{width:0}
/* ========== Page Transition ========== */
.page{display:none;padding:16px;min-height:100%;contain:layout style}
.page.active{display:block;animation:pageIn .3s var(--ease)}
.page.slide-out{animation:pageOut .22s var(--ease) forwards}
@keyframes pageIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes pageOut{to{opacity:0;transform:translateX(-16px)}}
/* ========== Skeleton ========== */
.skeleton{
  background:linear-gradient(90deg,var(--divider) 25%,rgba(79,70,229,0.06) 50%,var(--divider) 75%);
  background-size:200% 100%;
  animation:skeleton 1.6s ease-in-out infinite;
  border-radius:var(--r-md);
}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* ========== Update Banner ========== */
.update-banner{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;padding:10px 16px;border-radius:var(--r-lg);
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
  font-size:13px;cursor:pointer;transition:opacity .2s;
  contain:layout style;
}
.update-banner:active{opacity:.85}
.update-banner svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.update-banner .ub-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-light);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.update-banner .ub-dismiss{
  background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;margin-left:auto;padding:0;flex-shrink:0;
}
.update-banner .ub-dismiss svg{width:12px;height:12px;stroke:white}
/* ========== Hero ========== */
.hero-card{
  background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);
  border-radius:var(--r-xl);padding:28px 20px;margin-bottom:20px;color:white;
  position:relative;overflow:hidden;box-shadow:var(--shadow-xl);
  contain:layout style;
}
.hero-card::before{
  content:'';position:absolute;right:-24px;top:-24px;
  width:130px;height:130px;border-radius:50%;
  background:rgba(255,255,255,.12);
  animation:float1 7s ease-in-out infinite;
}
.hero-card::after{
  content:'';position:absolute;right:20px;bottom:-16px;
  width:90px;height:90px;border-radius:50%;
  background:rgba(255,255,255,.08);
  animation:float2 9s ease-in-out infinite;
}
@keyframes float1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.06)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-body{position:relative;z-index:1}
.hero-emoji{font-size:44px;margin-bottom:12px;display:block}
.hero-title{font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px}
.hero-sub{font-size:14px;opacity:.88}
.hero-version{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:12px;padding:4px 14px;border-radius:var(--r-pill);
  background:rgba(255,255,255,.22);font-size:12px;font-weight:600;
  backdrop-filter:blur(8px);
}
.hero-version svg{width:12px;height:12px;fill:var(--accent-light);stroke:var(--accent-light);stroke-width:1}
.hero-stats{display:flex;gap:20px;margin-top:16px}
.hero-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.hero-stat-num{font-size:22px;font-weight:800}
.hero-stat-label{font-size:11px;opacity:.8}
/* ========== Dashboard ========== */
.dashboard{grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dash-grid{display:grid}
.dash-item{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-lg);
  padding:14px 10px;text-align:center;
  box-shadow:var(--shadow-sm);transition:transform .2s var(--ease),box-shadow .2s var(--ease);
}
.dash-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.dash-icon{
  width:36px;height:36px;margin:0 auto 8px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.dash-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dash-num{font-size:20px;font-weight:800;color:var(--text-p);line-height:1}
.dash-label{font-size:11px;color:var(--text-s);margin-top:4px}
/* ========== Section Title ========== */
.section-title{
  font-size:11px;font-weight:700;
  color:var(--text-s);text-transform:uppercase;letter-spacing:.8px;
  margin:20px 0 12px;padding-left:4px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title .see-all{font-size:12px;color:var(--primary);cursor:pointer;text-transform:none;letter-spacing:normal;font-weight:600}
/* ========== Card Grid ========== */
.card-grid{grid-template-columns:repeat(2,1fr);gap:12px;display:grid}
.grid-card{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);
  padding:20px 16px;box-shadow:var(--shadow-sm);
  cursor:pointer;position:relative;overflow:hidden;
  transform-style:preserve-3d;will-change:transform;
  transition:transform .25s var(--ease),box-shadow .25s var(--ease);
}
.grid-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:var(--shadow-lg)}
.grid-card:active{transform:scale(.96);transition-duration:.1s}
.card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:24px}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.card-desc{font-size:12px;color:var(--text-s);line-height:1.3}
/* Chapter color schemes */
.c-blue .card-icon{background:linear-gradient(135deg,#EEF2FF,#C7D2FE)}
.c-orange .card-icon{background:linear-gradient(135deg,#FFF7ED,#FED7AA)}
.c-green .card-icon{background:linear-gradient(135deg,#ECFDF5,#A7F3D0)}
.c-pink .card-icon{background:linear-gradient(135deg,#FDF2F8,#FBCFE8)}
.c-red .card-icon{background:linear-gradient(135deg,#FEF2F2,#FECACA)}
.c-indigo .card-icon{background:linear-gradient(135deg,#EEF2FF,#C7D2FE)}
.c-purple .card-icon{background:linear-gradient(135deg,#FAF5FF,#E9D5FF)}
.c-amber .card-icon{background:linear-gradient(135deg,#FFFBEB,#FDE68A)}
.dark-mode .c-blue .card-icon{background:linear-gradient(135deg,#1E1B4B,#312E81)}
.dark-mode .c-orange .card-icon{background:linear-gradient(135deg,#431407,#7C2D12)}
.dark-mode .c-green .card-icon{background:linear-gradient(135deg,#022C22,#064E3B)}
.dark-mode .c-pink .card-icon{background:linear-gradient(135deg,#500724,#831843)}
.dark-mode .c-red .card-icon{background:linear-gradient(135deg,#450A0A,#7F1D1D)}
.dark-mode .c-indigo .card-icon{background:linear-gradient(135deg,#1E1B4B,#312E81)}
.dark-mode .c-purple .card-icon{background:linear-gradient(135deg,#3B0764,#581C87)}
.dark-mode .c-amber .card-icon{background:linear-gradient(135deg,#451A03,#78350F)}
/* ========== Quick Entry ========== */
.quick-entry{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);
  padding:16px;margin-bottom:20px;box-shadow:var(--shadow-sm);
}
.quick-entry-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.quick-entry-title svg{width:16px;height:16px;fill:none;stroke:var(--primary);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px}
.quick-tag{
  padding:8px 14px;border-radius:var(--r-pill);font-size:13px;
  background:var(--bg);color:var(--text-p);cursor:pointer;
  display:flex;align-items:center;gap:6px;min-height:44px;font-weight:500;
  border:1px solid var(--divider);transition:all .2s var(--ease);
}
.quick-tag svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.quick-tag:active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;border-color:var(--primary);
  transform:scale(.95);box-shadow:0 2px 10px rgba(79,70,229,0.35);
}
/* ========== Detail Header ========== */
.detail-header{
  display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px;
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);
}
.detail-icon{font-size:36px;flex-shrink:0}
.detail-info{flex:1}
.detail-title{font-size:18px;font-weight:700;margin-bottom:4px}
.detail-sub{font-size:13px;color:var(--text-s)}
/* ========== Rule Card ========== */
.rule-card{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);
  position:relative;transform-style:preserve-3d;
  transition:transform .25s var(--ease),box-shadow .25s var(--ease);
}
.rule-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.rule-card:active{transform:scale(.98)}
.rule-num{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:700;
  margin-bottom:10px;
  background:linear-gradient(135deg,var(--primary),var(--accent-light));
  color:white;
}
.rule-title{font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.4;padding-right:44px}
.fav-btn{
  position:absolute;top:12px;right:12px;
  width:36px;height:36px;border-radius:50%;
  background:var(--bg);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s var(--ease);color:var(--text-h);
}
.fav-btn:active{transform:scale(.82)}
.fav-btn.faved{color:#F59E0B}
.fav-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
@keyframes heartBurst{0%{transform:scale(1)}15%{transform:scale(1.5)}30%{transform:scale(.85)}50%{transform:scale(1.25)}70%{transform:scale(.93)}100%{transform:scale(1)}}
.hb{animation:heartBurst .55s var(--ease)}
/* ========== Info Boxes ========== */
.info-box{
  padding:10px 12px;border-radius:var(--r-md);margin:6px 0;
  font-size:13px;line-height:1.65;
  display:flex;align-items:flex-start;gap:8px;
}
.info-box .ib-icon{flex-shrink:0;margin-top:1px;font-size:14px}
.info-box .ib-text{flex:1}
.ib-danger{background:var(--error-bg);border-left:3px solid var(--error);color:var(--error)}
.dark-mode .ib-danger{color:#FCA5A5}
.ib-warning{background:var(--warning-bg);border-left:3px solid var(--warning);color:#92400E}
.dark-mode .ib-warning{color:#FCD34D}
.ib-success{background:var(--success-bg);border-left:3px solid var(--success);color:#065F46}
.dark-mode .ib-success{color:#6EE7B7}
.ib-info{background:var(--info-bg);border-left:3px solid var(--primary);color:#1E40AF}
.dark-mode .ib-info{color:#93C5FD}
.ib-d{background:var(--error-bg);border-left:3px solid var(--error);color:var(--error)}
.dark-mode .ib-d{color:#FCA5A5}
.ib-w{background:var(--warning-bg);border-left:3px solid var(--warning);color:#92400E}
.dark-mode .ib-w{color:#FCD34D}
.ib-s{background:var(--success-bg);border-left:3px solid var(--success);color:#065F46}
.dark-mode .ib-s{color:#6EE7B7}
.ib-i{background:var(--info-bg);border-left:3px solid var(--primary);color:#1E40AF}
.dark-mode .ib-i{color:#93C5FD}
/* ========== Related Tags ========== */
.related-rules{margin-top:12px;padding-top:12px;border-top:1px dashed var(--divider)}
.related-title{font-size:11px;color:var(--text-h);margin-bottom:6px}
.related-tag{
  display:inline-block;padding:4px 10px;border-radius:var(--r-pill);
  font-size:11px;background:var(--bg);color:var(--primary);
  margin:2px 4px 2px 0;cursor:pointer;
  border:1px solid var(--divider);transition:all .15s var(--ease);
}
.related-tag:active{background:var(--primary);color:white}
/* ========== Data Table ========== */
.data-table{width:100%;border-collapse:separate;border-spacing:0;margin:10px 0;font-size:13px;border:1px solid var(--divider);border-radius:var(--r-md);overflow:hidden}
.data-table th{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:10px 12px;text-align:left;font-weight:600}
.data-table td{padding:9px 12px;border-bottom:1px solid var(--divider)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:nth-child(even){background:var(--bg)}
.text-danger{color:var(--error);font-weight:600}
.text-warning{color:#D97706;font-weight:600}
.dark-mode .text-warning{color:#FBBF24}
/* ========== Search Bar ========== */
.search-wrap{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-lg);
  margin-bottom:12px;box-shadow:var(--shadow-sm);overflow:hidden;
  transition:border-radius .25s var(--ease);
}
.search-bar{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
}
.search-bar svg{width:18px;height:18px;fill:none;stroke:var(--text-h);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search-bar input{
  flex:1;border:none;outline:none;font-size:15px;font-family:inherit;
  background:transparent;color:var(--text-p);
}
.search-bar input::placeholder{color:var(--text-h)}
.search-clear{
  background:none;border:none;color:var(--text-h);cursor:pointer;
  min-width:44px;min-height:44px;display:none;align-items:center;justify-content:center;
  transition:color .15s;
}
.search-clear svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-clear:active{color:var(--text-p)}
.search-panels{
  border-top:1px solid var(--divider);padding:12px;display:none;
}
.search-panels.open{display:block}
.panel-title{
  font-size:11px;color:var(--text-s);text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:5px;
}
.panel-title svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hot-tags,.history-tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  padding:7px 14px;background:var(--bg);border-radius:var(--r-pill);
  font-size:13px;color:var(--text-s);cursor:pointer;
  min-height:40px;display:flex;align-items:center;gap:5px;
  border:1px solid var(--divider);transition:all .15s var(--ease);
}
.tag svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.tag:active,.tag.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:white;border-color:var(--primary)}
.history-item{
  display:flex;align-items:center;gap:8px;padding:7px 14px;
  background:var(--bg);border-radius:var(--r-pill);
  font-size:13px;color:var(--text-s);cursor:pointer;
  min-height:40px;border:1px solid var(--divider);transition:all .15s var(--ease);
}
.history-item svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.history-item:active{background:var(--bg)}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.history-clear{font-size:12px;color:var(--error);cursor:pointer;min-height:44px;display:flex;align-items:center}
/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-bar::-webkit-scrollbar{display:none}
.filter-tag{
  padding:6px 14px;border-radius:var(--r-pill);font-size:13px;
  background:var(--card);color:var(--text-s);border:1px solid var(--divider);
  cursor:pointer;white-space:nowrap;min-height:36px;display:flex;align-items:center;gap:4px;
  backdrop-filter:blur(8px);transition:all .15s var(--ease);
}
.filter-tag svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.filter-tag.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:white;border-color:var(--primary)}
.filter-tag:active{transform:scale(.94)}
/* Search results */
.search-result{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-lg);
  padding:14px;margin-bottom:8px;box-shadow:var(--shadow-sm);
  cursor:pointer;transition:all .2s var(--ease);
}
.search-result:hover{transform:translateX(4px);box-shadow:var(--shadow-md)}
.search-result:active{background:var(--bg)}
.search-result .rule-num{margin-bottom:6px}
.search-result .rule-title{font-size:14px}
.result-preview{font-size:12px;color:var(--text-s);margin-top:6px;line-height:1.5}
.result-preview .hl{background:#FEF3C7;color:#92400E;padding:1px 4px;border-radius:3px;font-weight:600}
.dark-mode .result-preview .hl{background:#5d4e14;color:#ffd54f}
.result-count{font-size:12px;color:var(--text-s);margin-bottom:12px;padding:0 4px}
/* ========== Decision Tree ========== */
.tree-container{padding:0 0 20px}
.tree-step{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.tree-question{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.tq-num{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
  box-shadow:0 2px 10px rgba(79,70,229,0.3);
}
.tree-options{display:flex;flex-direction:column;gap:8px}
.tree-option{
  padding:12px 14px;border-radius:var(--r-md);background:var(--bg);
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:8px;min-height:48px;
  border:1px solid var(--divider);transition:all .2s var(--ease);
}
.tree-option svg{width:16px;height:16px;fill:none;stroke:var(--text-s);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-left:auto;flex-shrink:0;transition:stroke .2s}
.tree-option:active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;border-color:var(--primary);
  transform:scale(.98);box-shadow:0 2px 12px rgba(79,70,229,0.3);
}
.tree-option:active svg{stroke:white}
.tree-result{
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);
  padding:20px;margin-bottom:12px;box-shadow:var(--shadow-md);
  border-left:4px solid;
  border-image:linear-gradient(180deg,var(--primary),var(--accent)) 1;
}
.tree-result-title{font-size:16px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tree-result-person{font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tree-result-person svg{width:16px;height:16px;fill:none;stroke:var(--primary);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tree-result-desc{font-size:13px;color:var(--text-s);margin-top:8px}
.tree-back{
  display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--r-md);
  background:var(--bg);font-size:14px;color:var(--primary);
  cursor:pointer;font-weight:600;margin-top:8px;min-height:44px;
  border:1px solid var(--divider);transition:all .15s var(--ease);
}
.tree-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tree-back:active{background:var(--primary);color:white}
/* ========== Bottom Nav ========== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--glass-border);
  display:flex;align-items:stretch;padding-bottom:var(--safe-bottom);
  z-index:1000;box-shadow:0 -4px 24px rgba(79,70,229,0.06);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--text-h);
  transition:color .2s;position:relative;min-height:44px;
}
.nav-item.active{color:var(--primary)}
.nav-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;line-height:1}
.nav-item .ni-label{font-size:10px;font-weight:500}
.nav-item.active svg{animation:navBounce .35s var(--ease)}
@keyframes navBounce{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(.88)}100%{transform:scale(1)}}
.nav-item .ni-badge{
  position:absolute;top:6px;right:calc(50% - 16px);
  min-width:16px;height:16px;border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;font-size:9px;display:none;align-items:center;justify-content:center;
  padding:0 4px;font-weight:700;box-shadow:0 1px 4px rgba(79,70,229,0.4);
}
.nav-item .ni-badge.show{display:flex}
/* ========== FAB ========== */
.fab{
  position:fixed;right:20px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(79,70,229,0.4);
  cursor:pointer;z-index:999;transition:all .2s var(--ease);border:none;
}
.fab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.fab:active{transform:scale(.85);box-shadow:0 2px 10px rgba(79,70,229,0.3)}
.fab:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(79,70,229,0.5)}
/* ========== Toast ========== */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 76px);left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--card-solid);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);color:var(--text-p);
  padding:11px 18px;border-radius:var(--r-lg);font-size:14px;
  z-index:2000;box-shadow:var(--shadow-lg);
  transition:transform .3s var(--ease);
  pointer-events:none;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.toast svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success svg{stroke:#10B981}
.toast.error svg{stroke:#EF4444}
.toast.info svg{stroke:var(--primary)}
.toast.warning svg{stroke:#F59E0B}
/* ========== Empty State ========== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-h)}
.empty-state svg{width:56px;height:56px;fill:none;stroke:var(--text-h);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 16px;display:block;opacity:.4}
.empty-text{font-size:15px;color:var(--text-s)}
.empty-sub{font-size:13px;color:var(--text-h);margin-top:6px}
/* ========== Form Iframe Modal ========== */
.form-iframe-wrap{width:100%;height:480px;border:none;border-radius:12px;background:#fff}
@media(max-height:600px){.form-iframe-wrap{height:400px}}
@media(max-height:500px){.form-iframe-wrap{height:340px}}
.form-iframe-wrap iframe{width:100%;height:100%;border:none}

/* ========== 新手引导 ========== */
.guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.guide-overlay.show{display:flex}
.guide-card{background:#fff;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center;animation:guidePop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes guidePop{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
.guide-emoji{font-size:56px;line-height:1;margin-bottom:16px;display:block}
.guide-step{background:linear-gradient(135deg,#4F46E5,#818CF8);color:#fff;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-bottom:12px}
.guide-title{font-size:20px;font-weight:800;color:#1E1B4B;margin-bottom:10px;line-height:1.3}
.guide-desc{font-size:14px;color:#6B7280;line-height:1.7;margin-bottom:20px}
.guide-highlight{background:#EEF2FF;color:#4F46E5;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:20px;display:inline-block}
.guide-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,#4F46E5,#6366F1);color:#fff;border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.35);transition:all .2s}
.guide-btn:active{transform:scale(.95);box-shadow:0 2px 8px rgba(79,70,229,.25)}
.guide-btn.secondary{background:#F3F4F6;color:#6B7280;box-shadow:none;font-weight:600;margin-left:8px}
.guide-btn.secondary:active{background:#E5E7EB}
.guide-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.guide-dot{width:8px;height:8px;border-radius:50%;background:#E5E7EB;transition:all .3s}
.guide-dot.active{width:24px;background:linear-gradient(90deg,#4F46E5,#818CF8);border-radius:4px}
.guide-progress{height:3px;background:#E5E7EB;border-radius:2px;margin-bottom:20px;overflow:hidden}
.guide-progress-bar{height:100%;background:linear-gradient(90deg,#4F46E5,#818CF8);border-radius:2px;transition:width .4s ease}

/* ========== Modal ========== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);z-index:3000;
  display:none;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
}
.modal-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{
  background:var(--card-solid);border-radius:24px 24px 0 0;
  padding:24px 20px calc(28px + var(--safe-bottom));width:100%;max-height:85vh;
  overflow-y:auto;animation:slideUp .3s var(--ease);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--divider);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;flex-direction:column;gap:10px}
.modal-action{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--bg);border-radius:var(--r-lg);cursor:pointer;
  font-size:15px;font-weight:500;min-height:48px;border:1px solid var(--divider);
  transition:all .15s var(--ease);
}
.modal-action svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.modal-action:active{background:var(--primary);color:white;border-color:var(--primary)}
.modal-action.danger{color:var(--error)}
.modal-action.danger:active{background:var(--error);color:white;border-color:var(--error)}
.share-icons{display:flex;gap:16px;justify-content:center;margin:16px 0}
.share-icon{
  width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:24px;border:1px solid var(--divider);transition:all .15s var(--ease);
}
.share-icon:active{transform:scale(.88)}
.share-label{text-align:center;font-size:12px;color:var(--text-s);margin-top:6px}
.feedback-input{
  width:100%;padding:12px 14px;border:1px solid var(--divider);border-radius:var(--r-md);
  font-size:15px;font-family:inherit;background:var(--bg);color:var(--text-p);
  resize:none;min-height:120px;outline:none;transition:all .2s;
  margin-bottom:12px;
}
.feedback-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
.feedback-submit{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;border:none;border-radius:var(--r-lg);
  font-size:15px;font-weight:700;cursor:pointer;min-height:48px;
  transition:all .2s var(--ease);
}
.feedback-submit:active{transform:scale(.97);opacity:.9}
/* ========== Context Menu ========== */
.context-menu{
  position:fixed;background:var(--card-solid);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:var(--r-xl);
  box-shadow:var(--shadow-xl);z-index:2500;overflow:hidden;display:none;min-width:180px;
  animation:scaleIn .15s var(--ease);
}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.context-menu.show{display:block}
.cm-item{
  display:flex;align-items:center;gap:10px;padding:13px 16px;
  font-size:14px;cursor:pointer;min-height:44px;border-bottom:1px solid var(--divider);
  transition:background .1s;
}
.cm-item:last-child{border-bottom:none}
.cm-item svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.cm-item:active{background:var(--bg)}
.cm-item.danger{color:var(--error)}
/* ========== Favorites Sort ========== */
.fav-sort{display:flex;gap:8px;margin-bottom:12px}
.sort-btn{
  padding:5px 12px;border-radius:var(--r-pill);font-size:12px;
  background:var(--card);color:var(--text-s);border:1px solid var(--divider);
  cursor:pointer;min-height:32px;display:flex;align-items:center;gap:4px;
  backdrop-filter:blur(8px);transition:all .15s var(--ease);
}
.sort-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sort-btn.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:white;border-color:var(--primary)}
/* ========== Recent Views ========== */
.recent-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--r-lg);
  cursor:pointer;min-height:56px;box-shadow:var(--shadow-sm);
  transition:all .2s var(--ease);
}
.recent-item svg{width:20px;height:20px;fill:none;stroke:var(--primary);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.recent-item:active{background:var(--bg)}
.recent-item .ri-text{flex:1;min-width:0}
.recent-item .ri-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-item .ri-sub{font-size:12px;color:var(--text-s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-item .ri-time{font-size:11px;color:var(--text-h);white-space:nowrap;flex-shrink:0}
/* ========== Pull Indicator ========== */
#pull-indicator{
  text-align:center;padding:8px;font-size:12px;color:var(--text-s);
  display:none;align-items:center;justify-content:center;gap:6px;
}
#pull-indicator svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#pull-indicator.pulling{display:flex}
#pull-indicator.refreshing svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ========== Responsive ========== */
@media (min-width:500px){.card-grid{grid-template-columns:repeat(3,1fr)};hero-card{padding:32px 24px};hero-title{font-size:28px}}
@media (min-width:768px){.card-grid{grid-template-columns:repeat(4,1fr)};hero-card{padding:36px 28px};hero-title{font-size:30px}}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%}.nav-bar,.status-bar,.bottom-nav,.fab,.no-print,.update-banner{display:none!important}.page{display:none!important}}
</style>

function switchTab(page){
  if(page===currentPage)return;
  var oldPage=document.getElementById('page-'+currentPage);
  var newPage=document.getElementById('page-'+page);
  if(oldPage){oldPage.classList.remove('active');oldPage.classList.add('slide-out');setTimeout(function(){oldPage.classList.remove('slide-out')},220);}
  setTimeout(function(){
    newPage.classList.add('active');
    newPage.classList.remove('slide-out');
  },10);
  document.querySelectorAll('.nav-item').forEach(function(ni){ni.classList.remove('active')});
  document.querySelector('[data-page="'+page+'"]').classList.add('active');
  if(page==='home'||page==='search'||page==='fav'){pageStack=['home','search','fav'];}
  currentPage=page;
  document.getElementById('navBack').style.display='none';
  document.getElementById('navTitle').textContent=page==='home'?'NC判责标准':page==='search'?'搜索':page==='fav'?'我的收藏':'NC判责标准';
  document.getElementById('mainContent').scrollTop=0;
}

function openChapter(n){
  var ch=chapters[n];if(!ch)return;
  pushPage('chapter');
  document.getElementById('chapterHeader').innerHTML='<div class="detail-icon">'+ch.icon+'</div><div class="detail-info"><div class="detail-title">'+ch.title+'</div><div class="detail-sub">'+ch.sub+'</div></div>';
  var rh='';
  if(ch.table){
    rh='<table class="data-table"><tr><th>场景</th><th>责任</th><th>人员</th></tr>';
    ch.table.forEach(function(r){rh+='<tr><td>'+r.scene+'</td><td class="'+(r.duty==='全责'?'text-danger':'text-warning')+'">'+r.duty+'</td><td>'+r.person+'</td></tr>'});
    rh+='</table>';
  } else {
    ch.rules.forEach(function(rule){
      rh+='<div class="rule-card" ontouchstart="handleRuleTouchStart(event,\''+rule.num+'\')" oncontextmenu="showContextMenu(event,\''+rule.num+'\')" onmousedown="handleRuleMousedown(event,\''+rule.num+'\')" onclick="openRule(\''+rule.num+'\')">';
      rh+='<div class="rule-num">'+rule.num+'</div>';
      rh+='<div class="rule-title">'+rule.title+'</div>';
      var favd=isFaved(rule.num);
      rh+='<button class="fav-btn'+(favd?' faved':'')+'" onclick="event.stopPropagation();toggleFav(\''+rule.num+'\')">';
      rh+=(favd?'<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>':'<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>');
      rh+='</button>';
      rule.items.forEach(function(item){rh+='<div class="info-box ib-'+item.type[0]+'"><div class="ib-icon">'+item.icon+'</div><div class="ib-text">'+item.text+'</div></div>'});
      rh+='</div>';
    });
  }
  document.getElementById('chapterRules').innerHTML=rh;
  showPage('page-chapter');
  document.getElementById('navTitle').textContent='第'+n+'章';
}

function openRule(num){
  var found=null,foundCh=null;
  Object.keys(chapters).forEach(function(k){
    var ch=chapters[k];
    if(ch.rules)ch.rules.forEach(function(r){if(r.num===num){found=r;foundCh=ch;}});
  });
  if(!found)return;
  pushPage('rule');
  var favd=isFaved(num);
  document.getElementById('ruleHeader').innerHTML='<div class="detail-icon">'+foundCh.icon+'</div><div class="detail-info"><div class="detail-title">'+found.num+' '+found.title+'</div><div class="detail-sub">'+foundCh.title+'</div></div>';
  var rh='';
  found.items.forEach(function(item){rh+='<div class="info-box ib-'+item.type[0]+'"><div class="ib-icon">'+item.icon+'</div><div class="ib-text">'+item.text+'</div></div>'});
  document.getElementById('ruleContent').innerHTML=rh;
  // Related
  if(found.related&&found.related.length>0){
    var rel='<div class="related-title">相关规则：</div>';
    found.related.forEach(function(rn){
      rel+='<span class="related-tag" onclick="openRule(\'第'+rn+'条\')">第'+rn+'条</span>';
    });
    document.getElementById('ruleRelated').style.display='block';
    document.getElementById('ruleRelated').innerHTML=rel;
  } else {
    document.getElementById('ruleRelated').style.display='none';
  }
  // Track stats + recent
  stats.viewed++;
  saveStats();
  recentViews=recentViews.filter(function(r){return r.num!==num});
  recentViews.unshift({num:num,title:foundCh.title+' · '+found.num,time:Date.now()});
  if(recentViews.length>10)recentViews=recentViews.slice(0,10);
  saveRecent();
  showPage('page-rule');
  document.getElementById('navTitle').textContent=found.num;
  // Long press for context
  currentRuleCtx={num:num,title:found.title};
}

function goBack(){
  if(pageStack.length<=1)return;
  pageStack.pop();
  var prev=pageStack[pageStack.length-1];
  var curr=document.querySelector('.page.active');
  if(curr){curr.classList.remove('active');curr.classList.add('slide-out');setTimeout(function(){curr.classList.remove('slide-out')},220);}
  setTimeout(function(){
    var target=document.getElementById('page-'+prev);
    if(target){target.classList.add('active');}
    currentPage=prev;
    var titles={home:'NC判责标准',search:'搜索',fav:'我的收藏',tree:'快速判责',chapter:'章节详情',rule:'规则详情'};
    document.getElementById('navTitle').textContent=titles[prev]||'NC判责标准';
    document.getElementById('navBack').style.display=pageStack.length>1?'flex':'none';
  },10);
}

function pushPage(page){
  pageStack.push(page);
  if(pageStack.length>1)document.getElementById('navBack').style.display='flex';
}
function showPage(pageId){
  var active=document.querySelector('.page.active');
  if(active&&active.id!==pageId){active.classList.remove('active');active.classList.add('slide-out');setTimeout(function(){active.classList.remove('slide-out')},220);}
  var target=document.getElementById(pageId);
  if(!target.classList.contains('active')){
    setTimeout(function(){
      target.classList.add('active');
      document.getElementById('mainContent').scrollTop=0;
    },10);
  }
}

function isFaved(num){return !!favData[num]}
function toggleFav(num){
  if(isFaved(num)){
    delete favData[num];
    showToast('已取消收藏','warning');
  } else {
    favData[num]=Date.now();
    showToast('已收藏 第'+num,'success');
    // Heart burst
    var btn=document.querySelector('.fav-btn.faved, .rule-card:hover .fav-btn');
    if(btn)btn.classList.add('hb');
    setTimeout(function(){if(btn)btn.classList.remove('hb')},600);
  }
  saveFavs();
  // Update current page fav buttons
  document.querySelectorAll('.fav-btn').forEach(function(b){
    var card=b.closest('.rule-card');
    if(card){
      var numEl=card.querySelector('.rule-num');
      if(numEl){
        var n=numEl.textContent.trim();
        if(isFaved(n)){
          b.classList.add('faved');
          b.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
        } else {
          b.classList.remove('faved');
          b.innerHTML='<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
        }
      }
    }
  });
}

function renderFavorites(){
  var el=document.getElementById('favoritesList');
  var nums=Object.keys(favData);
  if(nums.length===0){
    el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><div class="empty-text">还没有收藏</div><div class="empty-sub">在规则详情中点击 ☆ 收藏常用规则</div></div>';
    return;
  }
  var items=nums.map(function(n){return {num:n,time:favData[n]}});
  if(favSortOrder==='time'){items.sort(function(a,b){return b.time-a.time});}
  else {
    items.sort(function(a,b){
      var na=parseInt(a.num.replace('第','').replace('条',''));
      var nb=parseInt(b.num.replace('第','').replace('条',''));
      return na-nb;
    });
  }
  var html='<div style="margin-bottom:12px;font-size:13px;color:var(--text-s)">已收藏 '+nums.length+' 条规则</div>';
  items.forEach(function(item){
    var found=null,foundCh=null;
    Object.keys(chapters).forEach(function(k){
      var ch=chapters[k];
      if(ch.rules)ch.rules.forEach(function(r){if(r.num===item.num){found=r;foundCh=ch;}});
    });
    if(!found)return;
    html+='<div class="search-result" onclick="openRule(\''+item.num+'\')">';
    html+='<div class="rule-num">'+foundCh.icon+' '+foundCh.title.split('·')[0].trim()+'</div>';
    html+='<div class="rule-title">'+found.num+' '+found.title+'</div></div>';
  });
  el.innerHTML=html;
}

function formatTime(ts){
  var d=new Date(ts);
  var now=new Date();
  var diff=now-d;
  if(diff<60000)return '刚刚';
  if(diff<3600000)return Math.floor(diff/60000)+'分钟前';
  if(diff<86400000)return Math.floor(diff/3600000)+'小时前';
  return Math.floor(diff/86400000)+'天前';
}

// ===== SEARCH =====
var searchDebounce=null;
function onSearchFocus(){
  document.getElementById('searchPanels').classList.add('open');
  var v=document.getElementById('searchInput').value;
  if(!v.trim()){
    document.getElementById('hotSearchPanel').style.display='';
    document.getElementById('historyPanel').style.display='';
    document.getElementById('searchResults').innerHTML='';
    document.getElementById('searchFilterBar').style.display='none';
  }
}
function onSearchBlur(){
  setTimeout(function(){
    document.getElementById('searchPanels').classList.remove('open');
  },200);
}
function onSearchInput(){
  var v=document.getElementById('searchInput').value;
  document.getElementById('searchClear').style.display=v?'flex':'none';
  clearTimeout(searchDebounce);
  if(!v.trim()){showSearchDefault();return;}
  document.getElementById('hotSearchPanel').style.display='none';
  document.getElementById('historyPanel').style.display='none';
  searchDebounce=setTimeout(function(){doSearch(v)},200);
}
function showSearchDefault(){
  document.getElementById('hotSearchPanel').style.display='';
  document.getElementById('historyPanel').style.display='';
  document.getElementById('searchResults').innerHTML='';
  document.getElementById('searchFilterBar').style.display='none';
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  showSearchDefault();
  document.getElementById('searchInput').focus();
}
function searchFor(q){
  document.getElementById('searchInput').value=q;
  document.getElementById('searchInput').focus();
  onSearchInput();
}
function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q)return;
  if(!searchHistory.includes(q)){searchHistory.unshift(q);if(searchHistory.length>20)searchHistory=searchHistory.slice(0,20);saveHistory();}
  stats.searches++;saveStats();
  var results=[];
  Object.keys(chapters).forEach(function(k){
    var ch=chapters[k];
    var chTitleMatch=(ch.title+ch.sub).toLowerCase().indexOf(q)>=0;
    if(chTitleMatch)results.push({ch:ch,k:k,rule:null,score:3});
    if(ch.rules)ch.rules.forEach(function(r){
      var txt=(r.num+r.title+JSON.stringify(r.items)).toLowerCase();
      if(txt.indexOf(q)>=0){
        var score=2+(r.title.toLowerCase().indexOf(q)>=0?1:0);
        results.push({ch:ch,k:k,rule:r,score:score});
      }
    });
  });
  results.sort(function(a,b){return b.score-a.score});
  var usedChapters=[...new Set(results.map(function(r){return r.k}))];
  var filterBar=document.getElementById('searchFilterBar');
  if(usedChapters.length>1){
    filterBar.style.display='flex';
    var html='<span class="filter-tag active" onclick="filterSearch(this,null,\''+esc(q)+'\')">全部</span>';
    usedChapters.forEach(function(cid){
      var ch=chapters[cid];
      html+='<span class="filter-tag" onclick="filterSearch(this,'+cid+',\''+esc(q)+'\')">'+ch.title.split('·')[1].trim()+'</span>';
    });
    filterBar.innerHTML=html;
  } else {filterBar.style.display='none';}
  renderSearchResults(results);
}
function filterSearch(el,chapterId,q){
  document.querySelectorAll('#searchFilterBar .filter-tag').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  var results=[];
  Object.keys(chapters).forEach(function(k){
    if(chapterId&&String(chapterId)!==String(k))return;
    var ch=chapters[k];
    var chTitleMatch=(ch.title+ch.sub).toLowerCase().indexOf(q)>=0;
    if(chTitleMatch)results.push({ch:ch,k:k,rule:null,score:3});
    if(ch.rules)ch.rules.forEach(function(r){
      var txt=(r.num+r.title+JSON.stringify(r.items)).toLowerCase();
      if(txt.indexOf(q)>=0)results.push({ch:ch,k:k,rule:r,score:2});
    });
  });
  renderSearchResults(results);
}
function renderSearchResults(results){
  var el=document.getElementById('searchResults');
  if(results.length===0){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div class="empty-text">未找到相关规则</div><div class="empty-sub">换个关键词试试</div></div>';return;}
  var q=document.getElementById('searchInput').value.trim();
  var html='<div class="result-count">找到 '+results.length+' 条结果</div>';
  results.forEach(function(r){
    if(r.rule){
      html+='<div class="search-result" onclick="openChapter('+r.k+')">';
      html+='<div class="rule-num">'+r.ch.icon+' '+r.ch.title.split('·')[0].trim()+'</div>';
      html+='<div class="rule-title">'+r.rule.num+' '+r.rule.title+'</div>';
      var preview=r.rule.items.map(function(i){return i.icon+' '+i.text;}).join('；');
      html+='<div class="result-preview">'+hlText(preview,q)+'</div></div>';
    } else {
      html+='<div class="search-result" onclick="openChapter('+r.k+')">';
      html+='<div class="rule-num">'+r.ch.icon+' '+r.ch.sub+'</div>';
      html+='<div class="rule-title">'+hlText(r.ch.title,q)+'</div>';
      html+='<div class="result-preview">'+hlText(r.ch.sub,q)+'</div></div>';
    }
  });
  el.innerHTML=html;
}
function hlText(text,q){
  if(!q)return text;
  var re=new RegExp('('+esc(q)+')','gi');
  return text.replace(re,'<span class="hl">$1</span>');
}
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

// ===== DECISION TREE =====
function openDecisionTree(type){
  currentTree=type;treePath=[];
  pushPage('tree');
  var tree=decisionTrees[type];
  document.getElementById('treeTitle').textContent=tree.Title;
  document.getElementById('treeSub').textContent='根据情况选择，快速定位责任归属';
  renderTreeStep(0);
  showPage('page-tree');
  document.getElementById('navTitle').textContent='快速判责';
}
function renderTreeStep(idx){
  if(!currentTree)return;
  var tree=decisionTrees[currentTree];
  var step=tree.steps[idx];
  if(!step)return;
  var html='<div style="margin-bottom:16px;font-size:14px;color:var(--text-s)">'+tree.Title+'</div>';
  html+='<div class="tree-step"><div class="tree-question"><span class="tq-num">'+(treePath.length+1)+'</span>'+step.q+'</div><div class="tree-options">';
  step.opts.forEach(function(opt){
    if(opt.result){
      html+='<div class="tree-option" onclick="showTreeResult('+idx+',\''+esc(opt.label)+'\')">'+opt.label+'<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>';
    } else if(opt.next){
      html+='<div class="tree-option" onclick="goTreeNext(\''+opt.next+'\')">'+opt.label+'<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>';
    }
  });
  html+='</div></div>';
  if(treePath.length>0){html+='<div class="tree-back" onclick="goTreeBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> 返回上一步</div>';}
  document.getElementById('treeContainer').innerHTML=html;
}
function goTreeNext(nextId){
  for(var i=0;i<decisionTrees[currentTree].steps.length;i++){
    if(decisionTrees[currentTree].steps[i].id===nextId){
      treePath.push(i);
      renderTreeStep(i);return;
    }
  }
}
function goTreeBack(){
  if(treePath.length>0){treePath.pop();renderTreeStep(treePath.length>0?treePath[treePath.length-1]:0);}
}
function showTreeResult(stepIdx,optLabel){
  var step=decisionTrees[currentTree].steps[stepIdx];
  var result=null;
  step.opts.forEach(function(o){if(o.label===optLabel&&o.result)result=o.result;});
  if(!result)return;
  var dutyColor=result.title.indexOf('全责')!==-1?'var(--error)':result.title.indexOf('共责')!==-1?'var(--warning)':'var(--success)';
  var html='<div style="margin-bottom:16px;font-size:14px;color:var(--text-s)">'+decisionTrees[currentTree].Title+'</div>';
  html+='<div class="tree-result"><div class="tree-result-title" style="color:'+dutyColor+'">'+result.title+'</div>';
  html+='<div class="tree-result-person"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>责任人：<strong>'+result.person+'</strong></div>';
  html+='<div class="tree-result-desc">'+result.desc+'</div></div>';
  html+='<div class="tree-back" onclick="goTreeBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> 重新判断</div>';
  html+='<div class="tree-back" onclick="openDecisionTree(\''+currentTree+'\')" style="margin-top:8px"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg> 从头开始</div>';
  document.getElementById('treeContainer').innerHTML=html;
}

// ===== CONTEXT MENU =====
var longPressTimer=null;
function handleRuleTouchStart(e,num){
  longPressTimer=setTimeout(function(){
    var rule=null,foundCh=null;
    Object.keys(chapters).forEach(function(k){
      var ch=chapters[k];
      if(ch.rules)ch.rules.forEach(function(r){if(r.num===num){rule=r;foundCh=ch;}});
    });
    if(!rule)return;
    currentRuleCtx={num:num,title:foundCh.title+' · '+rule.num+' '+rule.title};
    showContextMenuAt(e,num);
  },600);
}
function handleRuleMousedown(e,num){
  if(e.button===2)return;
  longPressTimer=setTimeout(function(){
    var rule=null,foundCh=null;
    Object.keys(chapters).forEach(function(k){
      var ch=chapters[k];
      if(ch.rules)ch.rules.forEach(function(r){if(r.num===num){rule=r;foundCh=ch;}});
    });
    if(!rule)return;
    currentRuleCtx={num:num,title:foundCh.title+' · '+rule.num+' '+rule.title};
    showContextMenu(e,num);
  },600);
}
function showContextMenu(e,num){
  e.preventDefault();
  var rule=null,foundCh=null;
  Object.keys(chapters).forEach(function(k){
    var ch=chapters[k];
    if(ch.rules)ch.rules.forEach(function(r){if(r.num===num){rule=r;foundCh=ch;}});
  });
  if(!rule)return;
  currentRuleCtx={num:num,title:foundCh.title+' · '+rule.num+' '+rule.title};
  var menu=document.getElementById('contextMenu');
  var favText=document.getElementById('ctxFavText');
  var favItem=document.getElementById('ctxFav');
  if(isFaved(num)){favText.textContent='取消收藏';favItem.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>取消收藏</span>';}
  else{favText.textContent='收藏';favItem.innerHTML='<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>收藏</span>';}
  var x=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0)||0;
  var y=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0)||0;
  menu.style.left=x+'px';menu.style.top=y+'px';
  menu.classList.add('show');
}
function showContextMenuAt(e,num){
  var rule=null,foundCh=null;
  Object.keys(chapters).forEach(function(k){
    var ch=chapters[k];
    if(ch.rules)ch.rules.forEach(function(r){if(r.num===num){rule=r;foundCh=ch;}});
  });
  if(!rule)return;
  currentRuleCtx={num:num,title:foundCh.title+' · '+rule.num+' '+rule.title};
  var menu=document.getElementById('contextMenu');
  var favText=document.getElementById('ctxFavText');
  var favItem=document.getElementById('ctxFav');
  if(isFaved(num)){favText.textContent='取消收藏';favItem.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>取消收藏</span>';}

  var x=e.touches&&e.touches[0]?e.touches[0].clientX:0;

// ===== TOUCH GESTURES =====
function handleTouchStart(e){
  if(e.touches.length===1){
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    pullStartY=touchStartY;
  }
}
function handleTouchMove(e){
  var y=e.touches[0].clientY;
  var x=e.touches[0].clientX;
  // Pull to refresh
  if(currentPage==='home'&&document.getElementById('mainContent').scrollTop===0){
    var delta=y-pullStartY;
    if(delta>0&&delta<80){
      var ind=document.getElementById('pull-indicator');
      ind.classList.add('pulling');
      if(delta>40)ind.classList.add('refreshing');
      document.getElementById('pull-text').textContent=delta>40?'释放刷新':'下拉刷新';
    }
  }
  // Swipe to go back
  if(pageStack.length>1&&e.touches.length===1){
    var dx=x-touchStartX;
    if(dx>60&&Math.abs(y-touchStartY)<40){
      goBack();
    }
  }
}
function handleTouchEnd(e){
  document.getElementById('pull-indicator').classList.remove('pulling','refreshing');
  clearTimeout(longPressTimer);
}

// ===== PULL TO REFRESH (desktop) =====
function initPullToRefresh(){
  var main=document.getElementById('mainContent');
  var indicator=document.getElementById('pull-indicator');
  var refreshing=false;
  main.addEventListener('scroll',function(){
    if(currentPage!=='home')return;
    if(main.scrollTop===0&&!refreshing){
      indicator.classList.add('pulling');
      refreshing=true;
      setTimeout(function(){
        indicator.classList.add('refreshing');
        document.getElementById('pull-text').textContent='释放刷新';
      },300);
      setTimeout(function(){
        indicator.classList.remove('pulling','refreshing');
        document.getElementById('pull-text').textContent='下拉刷新';
        refreshing=false;
        showToast('已是最新内容','success');
      },1200);
    }
  });
}

var guideCurrent=0;

function renderGuideStep(){
  var s=guideSteps[guideCurrent];
  var card=document.getElementById('guideCard');
  var total=guideSteps.length;
  var progressPct=((guideCurrent)/(total-1)*100).toFixed(0);
  var dotsHTML='';
  for(var i=0;i<total;i++){
    dotsHTML+='<div class="guide-dot'+(i===guideCurrent?' active':'')+'"></div>';
  }
  card.innerHTML='
    <div class="guide-progress"><div class="guide-progress-bar" style="width:'+progressPct+'%"></div></div>
    <div class="guide-step">'+s.step+'</div>
    <span class="guide-emoji">'+s.emoji+'</span>
    <div class="guide-title">'+s.title+'</div>
    <div class="guide-desc">'+s.desc+'</div>
    '+(s.highlight?'<div class="guide-highlight">'+s.highlight+'</div>':'')+
    '<div class="guide-dots">'+dotsHTML+'</div>'+
    '<button class="guide-btn'+(guideCurrent<total-1?' secondary':'')+'" onclick="nextGuide()">'+s.btnText+'</button>';
}

function startGuide(){
  guideCurrent=0;
  renderGuideStep();
  document.getElementById('guideOverlay').classList.add('show');
}

function nextGuide(){
  if(guideCurrent<guideSteps.length-1){
    guideCurrent++;
    renderGuideStep();
  } else {
    closeGuide();
  }
}

function closeGuide(){
  document.getElementById('guideOverlay').classList.remove('show');
  window._ls.setItem('nc_guide_done','1');
}

})();
